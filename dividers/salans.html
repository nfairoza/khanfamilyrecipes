<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Salans — Divider</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,900;1,9..144,400;1,9..144,600&family=Source+Serif+4:ital,wght@0,400;0,600;1,400&family=Caveat:wght@500;700&display=swap');
:root{ --ink:#241f1a; --soft:#7a7468; --paper:#ffffff; }
*{box-sizing:border-box; -webkit-print-color-adjust:exact; print-color-adjust:exact;}
html,body{margin:0; padding:0; background:#efece7; color:var(--ink);
  font-family:'Source Serif 4', Georgia, serif; font-size:10.5pt; line-height:1.5;}
@page{ size:Letter; margin:0; }
.page{position:relative; width:8.5in; height:11in; margin:0.25in auto; overflow:hidden;
  background:var(--paper); box-shadow:0 2px 14px rgba(0,0,0,.12); page-break-after:always;}
.page.bleed{ padding:0; }
@media print{ body{background:#fff} .page{margin:0; box-shadow:none} }
.divider{background:linear-gradient(150deg, var(--accent), var(--accent-2));
  display:flex; align-items:center; justify-content:center;}
.divider .card{background:#fff; border-radius:24px; padding:.7in .9in; text-align:center;
  box-shadow:0 14px 40px rgba(0,0,0,.18); max-width:5.6in;}
.divider .card .art{width:2in; height:2in; border-radius:50%; margin:0 auto;
  overflow:hidden; border:6px solid var(--accent-soft);
  display:flex; align-items:center; justify-content:center; font-size:1in;}
.divider .card h2{font-family:'Fraunces',serif; font-weight:900; font-size:28pt; margin:.18in 0 .1in;}
.divider .card hr{border:none; height:3px; width:1.4in; margin:.12in auto;
  border-radius:2px; background:linear-gradient(90deg, var(--accent), var(--accent-2));}
.divider .card p{color:var(--soft); font-style:italic; font-size:11.5pt; margin:0;}
.tab{position:absolute; right:0; top:var(--tab-top, 3.0in);
  background:#fff; color:var(--accent); font-weight:700; font-size:10pt;
  font-family:'Fraunces',serif; letter-spacing:2px;
  padding:.14in .18in .14in .22in; border-radius:14px 0 0 14px;
  writing-mode:vertical-rl; text-orientation:mixed;
  box-shadow:-3px 3px 10px rgba(0,0,0,.15);}
</style>
</head>
<body>
<section class="page bleed divider" style="--accent:#ff5a4d; --accent-2:#ff8d7a; --accent-soft:#ffe4df;">
  <div class="card">
    <div class="art">🍲</div>
    <h2>Salans</h2>
    <hr>
    <p>Gravies that make the rice make sense.</p>
  </div>
  <div class="tab" style="--tab-top:3.0in">SALANS</div>
</section>
</body>
</html>
