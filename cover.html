<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>The Khan Family Cookbook — Cover</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,900;1,9..144,400;1,9..144,600&family=Source+Serif+4:ital,wght@0,400;0,600;1,400&family=Caveat:wght@500;700&display=swap');
:root{
  --ink:#241f1a; --soft:#7a7468; --paper:#ffffff;
  --marigold:#ff8a00; --marigold2:#ffb400; --coral:#ff5a4d;
  --turquoise:#13c4c4; --leaf:#5fc23b; --pink:#ff7eb6;
}
*{box-sizing:border-box; -webkit-print-color-adjust:exact; print-color-adjust:exact;}
html,body{margin:0; padding:0; background:#efece7; color:var(--ink);
  font-family:'Source Serif 4', Georgia, serif; font-size:10.5pt; line-height:1.5;}
@page{ size:Letter; margin:0; }
.page{position:relative; width:8.5in; height:11in; margin:0.25in auto; overflow:hidden;
  background:var(--paper); box-shadow:0 2px 14px rgba(0,0,0,.12); page-break-after:always;}
.page.bleed{ padding:0; }
@media print{ body{background:#fff} .page{margin:0; box-shadow:none} }
.cover{
  background:
    radial-gradient(9in 6in at 15% 8%,  #fff4d1 0%, transparent 60%),
    radial-gradient(8in 6in at 90% 20%, #ffe1ea 0%, transparent 60%),
    radial-gradient(9in 7in at 80% 95%, #d8f7f4 0%, transparent 60%),
    radial-gradient(8in 6in at 8% 90%,  #eaf9dc 0%, transparent 55%),
    linear-gradient(160deg, #fffdf6, #fff7e6);
  display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center;}
.cover .plate{
  width:3.6in; height:3.6in; border-radius:50%; padding:0.14in; margin-bottom:.4in;
  background:conic-gradient(var(--marigold), var(--coral), var(--pink), var(--turquoise), var(--leaf), var(--marigold2), var(--marigold));
  box-shadow:0 12px 34px rgba(255,138,0,.28);}
.cover .plate .inner{width:100%; height:100%; border-radius:50%; background:#fff;
  display:flex; align-items:center; justify-content:center; overflow:hidden;}
.cover .plate .inner img{width:100%; height:100%; object-fit:cover; object-position:center 30%; border-radius:50%;}
.cover h1{font-family:'Fraunces',serif; font-weight:900; font-size:36pt; margin:.05in 0; letter-spacing:.3px;}
.cover h1 em{font-style:italic; font-weight:600; color:var(--coral);}
.cover .script-sub{font-family:'Caveat',cursive; font-size:20pt; color:var(--marigold); margin:-.04in 0 .04in;}
.cover .sub{font-size:11.5pt; font-style:italic; color:var(--soft); margin:.04in 0 .3in;}
.cover .by{font-size:11.5pt;}
.cover .by b{color:var(--marigold);}
.dot{position:absolute; border-radius:50%; opacity:.85;}
</style>
</head>
<body>
<section class="page bleed cover">
  <span class="dot" style="left:.9in;top:1.1in;width:.16in;height:.16in;background:var(--coral)"></span>
  <span class="dot" style="left:7.4in;top:1.6in;width:.12in;height:.12in;background:var(--turquoise)"></span>
  <span class="dot" style="left:1.4in;top:8.9in;width:.14in;height:.14in;background:var(--leaf)"></span>
  <span class="dot" style="left:7.1in;top:9.3in;width:.18in;height:.18in;background:var(--marigold)"></span>
  <span class="dot" style="left:4.1in;top:.7in;width:.1in;height:.1in;background:var(--pink)"></span>
  <span class="dot" style="left:.7in;top:5.4in;width:.11in;height:.11in;background:var(--marigold2)"></span>
  <span class="dot" style="left:7.8in;top:5.9in;width:.13in;height:.13in;background:var(--coral)"></span>
  <div class="plate">
    <div class="inner"><img src="images/0f8812f1-46b0-4c99-a8fb-d78849df0fbd~1.jpg" alt="Noor, Yahya and their cat"></div>
  </div>
  <h1>The Khan Family <em>&amp;</em> Cookbook</h1>
  <div class="script-sub">recipes, memories &amp; a little chaos</div>
  <div class="sub">in the kitchen, together</div>
  <div class="by">A collection by <b>Noor &amp; Yahya Khan</b></div>
</section>
</body>
</html>
